<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>收藏夹淘金</title>
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <p class="eyebrow">收藏夹淘金</p>
          <h1>今天想翻翻哪三张牌？</h1>
          <p class="subtitle">从你的书签中随机挑选，翻牌即见。</p>
        </div>
        <button id="refresh-btn" class="btn" type="button">再翻三张</button>
      </header>

      <section class="cards" id="cards"></section>

      <footer class="footer" id="footer"></footer>
    </main>

    <div class="corner-badge" id="corner-badge"></div>

    <template id="card-template">
      <article class="card">
        <div class="card-inner">
          <div class="card-face card-back">
            <div class="back-frame">
              <div class="back-symbol">♣</div>
              <div class="back-title">MINER</div>
              <div class="back-subtitle">BOOKMARKS</div>
            </div>
          </div>
          <div class="card-face card-front">
            <div class="card-top">
              <span class="favicon" aria-hidden="true"></span>
              <div>
                <a class="title" target="_blank" rel="noreferrer"></a>
                <p class="url"></p>
              </div>
            </div>
            <div class="info-row">
              <p class="path"></p>
              <p class="meta-date"></p>
            </div>
            <div class="meta">
              <span class="meta-item meta-stats"></span>
            </div>
            <div class="actions">
              <button class="action-btn btn-like" type="button">赞</button>
              <button class="action-btn btn-dislike" type="button">踩</button>
              <button class="action-btn btn-delete" type="button">删除</button>
            </div>
          </div>
        </div>
      </article>
    </template>

    <div id="toast" class="toast" role="status" aria-live="polite">
      <span class="toast-message"></span>
      <button class="toast-action" type="button">撤销</button>
    </div>

    <script src="newtab.js"></script>
  </body>
</html>
